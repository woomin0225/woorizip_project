<body>
  <h1>개인정보 수집·이용 동의서</h1>
  <p>우리집은 서비스 제공을 위해 아래와 같이 개인정보를 수집·이용합니다.</p>

  <table>
    <tr><th>수집·이용 목적</th><td>회원 식별, 계약 신청 처리, 전자서명 및 결제 처리, 고객 문의 대응</td></tr>
    <tr><th>수집 항목</th><td>이름, 휴대전화번호, 이메일, 주소/호실, 입주일, 계약기간, 결제 관련 정보</td></tr>
    <tr><th>보유·이용 기간</th><td>목적 달성 후 지체 없이 파기. 단, 관련 법령에 따른 보관 의무 기간은 예외.</td></tr>
  </table>

  <h2>동의 거부 권리</h2>
  <p>귀하는 동의를 거부할 권리가 있으나, 필수항목에 대한 동의 거부 시 계약 신청 등 핵심 서비스 이용이 제한될 수 있습니다.</p>
