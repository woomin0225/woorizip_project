  <h1>개인정보 제3자 제공 동의서</h1>
  <p>우리집은 계약 및 결제/전자서명 업무 처리를 위해 아래와 같이 개인정보를 제3자에게 제공합니다.</p>

  <table>
    <tr><th>제공받는 자</th><th>제공 목적</th><th>제공 항목</th><th>보유·이용 기간</th></tr>
    <tr>
      <td>토스페이먼츠</td>
      <td>결제 승인, 결제내역 확인, 정산</td>
      <td>이름, 연락처, 주문번호, 결제금액, 결제승인정보</td>
      <td>관계 법령에 따른 보관기간</td>
    </tr>
    <tr>
      <td>이폼사인</td>
      <td>전자계약 문서 생성, 전자서명 진행</td>
      <td>이름, 연락처, 계약서 문서정보, 서명이력</td>
      <td>관계 법령에 따른 보관기간</td>
    </tr>
  </table>

  <p>귀하는 동의를 거부할 권리가 있으나, 거부 시 전자계약/결제 서비스 이용이 제한될 수 있습니다.</p>
</body>
