name: Frontend Deploy

on:
  push:
    branches:
      - main
    paths:
      - "frontend_workspace/**"
      - ".github/workflows/frontend-deploy.yml"
  workflow_dispatch:

concurrency:
  group: frontend-deploy
  cancel-in-progress: true

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    env:
      AWS_REGION: ${{ secrets.AWS_REGION }}
      S3_BUCKET: ${{ secrets.FRONTEND_BUCKET }}
      CLOUDFRONT_DISTRIBUTION_ID: ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }}
      FRONTEND_DIR: frontend_workspace

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend_workspace/package-lock.json

      - name: Create production env file
        working-directory: ${{ env.FRONTEND_DIR }}
        run: |
          cat <<EOF > .env.production
          REACT_APP_API_BASE_URL=${{ secrets.REACT_APP_API_BASE_URL }}
          REACT_APP_AI_BASE_URL=${{ secrets.REACT_APP_AI_BASE_URL }}
          REACT_APP_KAKAO_MAP_KEY=${{ secrets.REACT_APP_KAKAO_MAP_KEY }}
          REACT_APP_TOSS_CLIENT_KEY=${{ secrets.REACT_APP_TOSS_CLIENT_KEY }}
          EOF

      - name: Install dependencies
        working-directory: ${{ env.FRONTEND_DIR }}
        run: npm ci

      - name: Build frontend
        working-directory: ${{ env.FRONTEND_DIR }}
        run: npm run build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          role-session-name: github-actions-frontend-deploy
          aws-region: ${{ env.AWS_REGION }}

      - name: Sync build files to S3
        run: aws s3 sync "${{ env.FRONTEND_DIR }}/build/" "s3://${{ env.S3_BUCKET }}" --delete

      - name: Invalidate CloudFront cache
        run: aws cloudfront create-invalidation --distribution-id "${{ env.CLOUDFRONT_DISTRIBUTION_ID }}" --paths "/*"
