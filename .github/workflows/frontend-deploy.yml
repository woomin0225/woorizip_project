name: Deploy Frontend

on:
  workflow_dispatch:
  push:
    branches: ["develop", "main"]
    paths:
      - "frontend_workspace/**"
      - ".github/workflows/frontend-deploy.yml"

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend_workspace

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend_workspace/package-lock.json

      - name: Install deps
        run: npm install

      - name: Build
        run: npm run build
        env:
          CI: "false"
          REACT_APP_API_BASE_URL: ${{ secrets.REACT_APP_API_BASE_URL }}
          REACT_APP_AI_BASE_URL: ${{ secrets.REACT_APP_AI_BASE_URL }}
          REACT_APP_KAKAO_MAP_KEY: ${{ secrets.REACT_APP_KAKAO_MAP_KEY }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v5
        with:
          aws-region: ${{ secrets.AWS_REGION }}
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}

      - name: Upload to S3
        run: aws s3 sync build/ s3://${{ secrets.FRONTEND_BUCKET }}/ --delete

      - name: Invalidate CloudFront
        run: >
          aws cloudfront create-invalidation-for-distribution-tenant
          --id ${{ secrets.CLOUDFRONT_DISTRIBUTION_TENANT_ID }}
          --invalidation-batch "{\"Paths\":{\"Quantity\":1,\"Items\":[\"/*\"]},\"CallerReference\":\"frontend-${{ github.sha }}\"}"
