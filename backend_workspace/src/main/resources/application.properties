spring.application.name=backend_project
spring.config.import=optional:classpath:application-secret.properties

# encoding
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.force=true
server.servlet.encoding.enabled=true

# dbms connect 
# mysql connect  ---------------------------------------------
spring.datasource.url=jdbc:mysql://localhost:3306/woorizipdb
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
#spring.datasource.username=${DB_USERNAME:root}
spring.datasource.username=root
spring.datasource.password=Student80!
#spring.datasource.password=${DB_PASSWORD}

spring.jpa.show-sql=true     
#spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.hibernate.ddl-auto=none 
spring.jpa.generate-ddl=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database=mysql
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.id.new_generator_mappings=false
spring.jpa.defer-datasource-initialization=true


# file upload limited file size
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# file upload and download folder setting
app.upload-dir=/Users/joosung/upload_files
# sub path : notice, board, photo etc....

logging.level.root=info
logging.level.org.hibernate=info

# json serializable error setting
spring.jackson.serialization.fail-on-empty-beans=false
spring.jackson.time-zone=Asia/Seoul


# static access folder settings
spring.web.resources.static-locations=classpath:/static/,classpath:/resources/,classpath:/META-INF/resources/,file:src/main/webapp/resources/

