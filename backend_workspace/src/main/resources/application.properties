spring.application.name=backend_project
spring.config.import=optional:classpath:application-secret.properties

# encoding
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.force=true
server.servlet.encoding.enabled=true

# dbms connect 
# mysql connect  ---------------------------------------------
spring.datasource.url=jdbc:mysql://localhost:3306/woorizipdb
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD}

spring.jpa.show-sql=true     
#spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.hibernate.ddl-auto=none 
spring.jpa.generate-ddl=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database=mysql
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.id.new_generator_mappings=false
spring.jpa.defer-datasource-initialization=true


# file upload limited file size
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=30MB
spring.servlet.multipart.max-request-size=50MB

# file upload and download folder setting
app.upload-dir=C:/upload_files
app.contract-doc-dir=C:/contract_docs
app.contract-doc-url-prefix=/contract-docs
# sub path : notice, board, photo etc....

logging.level.root=info
logging.level.org.hibernate=info

# json serializable error setting
spring.jackson.serialization.fail-on-empty-beans=false
spring.jackson.time-zone=Asia/Seoul


# static access folder settings
spring.web.resources.static-locations=classpath:/static/,classpath:/resources/,classpath:/META-INF/resources/,file:src/main/webapp/resources/

# JWT
#jwt.secret=${JWT_SECRET}
#jwt.access-exp=${JWT_ACCESS_EXP:1800000}
#jwt.refresh-exp=${JWT_REFRESH_EXP:86400000}
jwt.secret=${JWT_SECRET}
# access token
jwt.access-exp=1800000
# refresh token
jwt.refresh-exp=86400000

kakao.rest-api-key=${KAKAO_REST_API_KEY}
kakaomap.rest-api-key=${KAKAOMAP_REST_API_KEY}
kakao.geocoding.api.uri=${KAKAO_GEOCODING_API_URI}


# OAuth2 (Google & Kakao)

app.oauth2.authorized-redirect-uris=http://localhost:3000/oauth2/redirect

# Google
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=profile,email

# Kakao
spring.security.oauth2.client.registration.kakao.client-id=${KAKAO_REST_API_KEY}
spring.security.oauth2.client.registration.kakao.client-secret=${KAKAO_CLIENT_SECRET}
spring.security.oauth2.client.registration.kakao.redirect-uri={baseUrl}/login/oauth2/code/kakao
spring.security.oauth2.client.registration.kakao.authorization-grant-type=authorization_code
spring.security.oauth2.client.registration.kakao.client-authentication-method=client_secret_post
spring.security.oauth2.client.registration.kakao.scope=profile_nickname

spring.security.oauth2.client.provider.kakao.authorization-uri=https://kauth.kakao.com/oauth/authorize
spring.security.oauth2.client.provider.kakao.token-uri=https://kauth.kakao.com/oauth/token
spring.security.oauth2.client.provider.kakao.user-info-uri=https://kapi.kakao.com/v2/user/me
spring.security.oauth2.client.provider.kakao.user-name-attribute=id

# Payment/Signature integration (dev)
toss.api.base-url=https://api.tosspayments.com
toss.secret-key=${TOSS_TEST_SECRET_KEY:}
toss.client-key=${TOSS_TEST_CLIENT_KEY:}

#AI 서버 BASE URI
ai.server.base-url=http://127.0.0.1:8000

#AI 게시글/첨부파일 요약
ai.summary.base-url=${AI_SUMMARY_BASE_URL:http://127.0.0.1:8000}
ai.summary.api-key=${AI_SUMMARY_API_KEY:local-dev-key}
ai.summary.connect-timeout-seconds=${AI_SUMMARY_CONNECT_TIMEOUT_SECONDS:5}
ai.summary.read-timeout-seconds=${AI_SUMMARY_READ_TIMEOUT_SECONDS:120}
ai.summary.max-attachment-bytes=${AI_SUMMARY_MAX_ATTACHMENT_BYTES:31457280}

#AI 이미지 기반 정보 추출 및 저장
ai.server.internal-api-key=local-dev-key

ai.server.timeout-ms=15000
# Agent(Project) API
ai.agent.endpoint=https://tes123-resource.openai.azure.com/openai/v1
ai.agent.endpoint-path=${AI_AGENT_ENDPOINT_PATH:}
ai.agent.model=${AI_AGENT_MODEL:gpt-4o-mini}
ai.agent.api-version=${AI_AGENT_API_VERSION:}

ai.agent.system-prompt=${AI_AGENT_SYSTEM_PROMPT:당신은 코리빙 하우스 플랫폼의 개인 비서 우리봇입니다. 사용자와 임대인의 업무를 돕고 질문에 답하며 페이지 이동과 기능 사용을 안내합니다. 항상 한국어와 존댓말을 사용하고 항상 친절하고 차분하게 응답하세요. 어떠한 경우에도 부적절한 표현, 공격적 표현, 비하나 혐오 표현을 사용하지 마세요. 이모티콘과 이모지를 사용하지 말고 별표 두 개 강조 표기를 사용하지 마세요. 사실이 불확실하면 추측하지 말고 확인이 필요하다고 안내하세요. 답변은 간결하고 명확하게 작성하고 필요할 때만 번호 목록으로 단계 안내를 제공하세요.}
ai.agent.base-info=${AI_AGENT_BASE_INFO:서비스명=우리집;플랫폼유형=코리빙하우스;주요대상=공용시설을 함께 사용하는 입주자와 임대인;핵심기능=공용시설 예약;거래특성=전세와 월세 중심,매매 비중 낮음;응답원칙=모르는 내용은 추정하지 말고 필요한 정보를 확인 질문}
ai.agent.auth-mode=api_key
ai.agent.api-key=${AI_AGENT_API_KEY:}
AI_AGENT_SYSTEM_PROMPT=


# SPA fallback/forward (API-only local default)
app.spa.forward-enabled=${APP_SPA_FORWARD_ENABLED:false}
spring.mvc.log-resolved-exception=${SPRING_MVC_LOG_RESOLVED_EXCEPTION:false}

