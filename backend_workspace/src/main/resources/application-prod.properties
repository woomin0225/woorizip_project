spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
server.forward-headers-strategy=framework

# Linux EC2 runtime paths
app.upload-dir=${APP_UPLOAD_DIR:/opt/myapp/storage/upload_files}
app.contract-doc-dir=${APP_CONTRACT_DOC_DIR:/opt/myapp/storage/contract_docs}
app.contract-doc-url-prefix=${APP_CONTRACT_DOC_URL_PREFIX:/contract-docs}
app.frontend-base-url=${APP_FRONTEND_BASE_URL:https://www.woorizip.life}

# Runtime integration values
jwt.secret=${JWT_SECRET}
ai.server.base-url=${FASTAPI_BASE_URL}
ai.summary.base-url=${AI_SUMMARY_BASE_URL:${FASTAPI_BASE_URL}}
ai.server.timeout-ms=${AI_SERVER_TIMEOUT_MS:60000}

# Keep current defaults unless explicitly overridden in prod
ai.summary.api-key=${AI_SUMMARY_API_KEY:local-dev-key}
ai.server.internal-api-key=${AI_SERVER_INTERNAL_API_KEY:local-dev-key}
app.oauth2.authorized-redirect-uris=${APP_OAUTH2_AUTHORIZED_REDIRECT_URIS:https://www.woorizip.life/oauth2/redirect}

# Hibernate SQL logging off in prod
# SQL 자체 출력 끔
spring.jpa.show-sql=false
# 예쁘게 줄바꿈되는 출력 끔
spring.jpa.properties.hibernate.format_sql=false

# Hibernate SQL logger 끔
logging.level.org.hibernate=warn
# 바인딩 파라미터 로그 끔
logging.level.org.hibernate.SQL=off
# 구버전 계열 바인딩 로그 대비용
logging.level.org.hibernate.orm.jdbc.bind=off
# 하이버네이트 일반 로그는 경고 이상만 남김
logging.level.org.hibernate.type.descriptor.sql=off